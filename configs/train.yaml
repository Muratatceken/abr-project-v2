# ABR Transformer V2 — Intensity-Conditioned Diffusion Training Config
# ═════════════════════════════════════════════════════════════════════

seed: 42
device: "cuda"
log_dir: "runs/abr_transformer"
exp_name: "abr_intensity_cond_v2"

# ── Dataset ──────────────────────────────────────────────────────────
data:
  train_csv: "data/processed/ultimate_dataset_with_clinical_thresholds.pkl"
  sequence_length: 200
  static_order: ["Age", "Intensity", "Stimulus Rate", "FMP"]
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

# ── DataLoader ───────────────────────────────────────────────────────
loader:
  batch_size: 32
  num_workers: 4
  pin_memory: true
  drop_last: true
  prefetch_factor: 2
  persistent_workers: false

# ── Model ────────────────────────────────────────────────────────────
model:
  sequence_length: 200
  d_model: 192
  n_layers: 4
  n_heads: 6
  ff_mult: 4
  dropout: 0.08
  num_classes: 5
  intensity_emb_dim: 64
  aux_static_dim: 3
  # Legacy compat (passed but handled internally)
  input_channels: 1
  static_dim: 4

# ── Conditioning ─────────────────────────────────────────────────────
# Higher dropout rates improve CFG quality for generation
conditioning:
  cfg_dropout_prob: 0.15          # drop intensity + aux_static (was 0.10)
  class_cfg_dropout_prob: 0.20    # drop class label only (was 0.15)
  both_cfg_dropout_prob: 0.10     # drop everything — fully unconditional (was 0.05)
  intensity_normalization: "unit_range"
  fmp_clip_percentile: 99

# ── Diffusion ────────────────────────────────────────────────────────
diffusion:
  num_train_steps: 1000
  schedule: "cosine"
  v_prediction: true
  sample_steps: 50
  ddim_eta: 0.0
  cfg_scale: 3.0              # increased for stronger generation guidance
  class_cfg_scale: 2.0         # increased for better class-conditional generation

# ── Optimizer ────────────────────────────────────────────────────────
optim:
  lr: 0.0002
  betas: [0.9, 0.99]
  weight_decay: 0.00001
  grad_clip: 1.0
  amp: true
  ema_decay: 0.999

# ── Loss ─────────────────────────────────────────────────────────────
loss:
  stft_weight: 0.15
  stft:
    n_fft: 64
    hop_length: 16
    win_length: 64
    eps: 0.00000001

# ── Trainer ──────────────────────────────────────────────────────────
trainer:
  max_epochs: 300
  log_every_steps: 50
  validate_every_epochs: 1
  sample_every_epochs: 5
  num_val_plots: 8
  num_sample_plots: 8
  ckpt_dir: "checkpoints/abr_transformer"
  save_every_epochs: 10
  keep_last_k: 5
  resume: ""

# ── LR Scheduler ────────────────────────────────────────────────────
advanced:
  lr_scheduler: "cosine"
  lr_warmup_steps: 1000

# ── Visualization ───────────────────────────────────────────────────
viz:
  plot_spectrogram: true
  plot_audio: false
  max_waveform_plots: 8
  max_spectrogram_plots: 4

# ── Augmentation ────────────────────────────────────────────────────
advanced_augmentation:
  enabled: true
  time_shift_samples: 2
  noise_std: 0.01
  apply_prob: 0.5
  mixup_prob: 0.15
  cutmix_prob: 0.15
  augmentation_strength: 1.0
  curriculum_aware: true

# ── Early Stopping ──────────────────────────────────────────────────
early_stopping:
  enabled: true
  type: 'basic'
  patience: 50
  min_delta: 0.000001
  metric: 'val_signal_mse'
  mode: 'min'
  restore_best_weights: true
  warmup_epochs: 15

# ── Monitoring ──────────────────────────────────────────────────────
monitoring:
  enabled: true
  save_dir: 'monitoring'
  track_gradients: true
  track_activations: false
  track_resources: true
  resource_monitoring:
    enabled: true
  model_health:
    enabled: true
  alerts:
    enabled: true
    alert_configs:
      - metric_name: 'gradient_norm'
        threshold: 10.0
        condition: 'greater'
        consecutive_violations: 3

# ── Logging ─────────────────────────────────────────────────────────
logging:
  console_log_level: "INFO"
