# Evaluation configuration for ABR Transformer V2
# Matches new intensity-conditioned architecture with dual CFG

# Dataset
dataset:
  data_path: "data/processed/ultimate_dataset_with_clinical_thresholds.pkl"
  batch_size: 128
  num_workers: 8
  pin_memory: true

# Model architecture (must match training config)
model:
  checkpoint_path: "checkpoints/abr_v2_best.pt"
  device: "cuda"
  precision: "float32"
  input_channels: 1
  static_dim: 4
  sequence_length: 200
  d_model: 192
  n_layers: 4
  n_heads: 6
  ff_mult: 4
  dropout: 0.08
  num_classes: 5
  intensity_emb_dim: 64
  aux_static_dim: 3

# Diffusion
diffusion:
  num_train_steps: 1000        # Must match training T — never change this
  sample_steps: 50             # DDIM inference steps (independent of T)
  ddim_eta: 0.0
  cfg_scale: 3.0               # Intensity/aux conditioning guidance
  class_cfg_scale: 2.0         # Class conditioning guidance

# Evaluation modes
evaluation:
  mode: "both"                 # "reconstruction", "generation", or "both"
  num_samples: 1000
  seed: 42

  reconstruction:
    timestep_strategy: "uniform"
    fixed_timestep: 500

  generation:
    num_steps: 50              # DDIM sampling steps (NOT training T)
    temperature: 1.0

# Metrics
metrics:
  signal:
    mse: true
    correlation: true
    snr: true
    psnr: true
    ssim: true
    stft_loss: true

  statistical_analysis:
    confidence_level: 0.95
    bootstrap_method: "percentile"

# Output
output:
  save_dir: "evaluation_results"
  save_format: "json"
  save_samples: true
  save_plots: true

# Report
report:
  publication_ready: true
  include_confidence_intervals: true
  save_topk_examples: 10
  save_spectrograms: false

# Visualization
visualization:
  scatter_plots: true
  metrics_correlation: true

# TensorBoard
tensorboard:
  enabled: true
  log_dir: "logs/evaluation"
  log_metrics: true
  log_plots: true

# Performance
performance:
  use_amp: false
  benchmark: false
